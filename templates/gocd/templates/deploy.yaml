format_version: 10
pipelines:
  build-{{ .Values.name }}-{{ .Values.environment }}:
    group: xquare
    environment_variables:

    label_template: "${git[:7]}"
    materials:
      git:
        git: https://github.com/{{ .Values.organization }}/{{ .Values.repository }}
        shallow_clone: false
        auto_update: true
        branch: {{ .Values.branch }}
    stages:
      - build:
          jobs:
            build:
              resources:
                - build
              artifacts:
                - build:
                    source: build_result.env
                    destination: artifacts
              tasks:
                - exec:
                    command: /bin/bash
                    arguments:
                      - -c
                      - |
                        curl -o docker_build.sh https://raw.githubusercontent.com/team-xquare/xquare-gitops-repo/v2/script/docker_build.sh
                        curl -o Dockerfile https://raw.githubusercontent.com/team-xquare/xquare-gitops-repo/v2/pipelines/{{ .Values.environment }}/{{ .Values.name }}
                        chmod +x docker_build.sh
                        ./docker_build.sh {{ .Values.environment }} {{ .Values.name }}
      - deploy:
          jobs:
            deploy:
              resources:
                - deploy
              tasks:
                - fetch:
                    run_if: any
                    artifact_origin: gocd
                    stage: build
                    job: build
                    is_file: yes
                    source: artifacts/build_result.env
                    destination: environment
                - exec:
                    command: /bin/bash
                    arguments:
                      - -c
                      - |
                        cat environment/build_result.env
                        source environment/build_result.env
                        curl -o resource_deploy.sh https://raw.githubusercontent.com/team-xquare/xquare-gitops-repo/v2/script/resource_deploy.sh
                        chmod +x resource_deploy.sh
                        ./resource_deploy.sh {{ .Values.name }} {{ .Values.environment }} ${{ .Values.name }}_REPOSITORY
