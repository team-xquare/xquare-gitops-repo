---
# Source: gocd/templates/deploy.yaml
format_version: 10
pipelines:
  build-maeumgagym:
    group: xquare
    environment_variables:

    label_template: "${git[:7]}"
    materials:
      git:
        git: https://github.com/MaeumGaGym/MaeumGaGym_Backend
        shallow_clone: false
        auto_update: true
        branch: develop
    stages:
      - build:
          jobs:
            build:
              resources:
                - build
              artifacts:
                - build:
                    source: build_result.env
                    destination: artifacts
              tasks:
                - exec:
                    command: /bin/bash
                    arguments:
                      - -c
                      - |
                        curl -o docker_build.sh https://raw.githubusercontent.com/team-xquare/xquare-gitops-repo/v2/script/docker_build.sh
                        chmod +x docker_build.sh
                        ./docker_build.sh stag maeumgagym
      - deploy:
          jobs:
            deploy:
              resources:
                - deploy
              tasks:
                - fetch:
                    run_if: any
                    artifact_origin: gocd
                    stage: build
                    job: build
                    is_file: yes
                    source: artifacts/build_result.env
                    destination: build_result.env
                - exec:
                    command: /bin/bash
                    arguments:
                      - -c
                      - |
                        source build_result.env
                        cat build_result.env
                        cd build_result.env
                        ls
                        curl -o resource_deploy.sh https://raw.githubusercontent.com/team-xquare/xquare-gitops-repo/v2/script/resource_deploy.sh
                        chmod +x resource_deploy.sh
                        ./resource_deploy.sh maeumgagym stag $maeumgagym_REPOSITORY
