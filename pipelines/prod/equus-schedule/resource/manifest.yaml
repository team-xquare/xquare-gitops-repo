---
# Source: applications/templates/poddistruptionbudget.yaml
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  namespace: entry-prod
  name: equus-schedule-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: equus-schedule-prod
---
# Source: applications/templates/vaultsecret.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: equus-schedule-prod-account
  namespace: entry-prod
---
# Source: applications/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  namespace: entry-prod
  name: equus-schedule-prod
  labels:
    app: equus-schedule-prod
    project: equus-schedule
    environment: prod
spec:
  type: ClusterIP
  selector:
    app: equus-schedule-prod
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: port
      port: 8080
      targetPort: 8080
      protocol: TCP
---
# Source: applications/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: entry-prod
  name: equus-schedule-prod
  labels:
    app: equus-schedule-prod
    project: equus-schedule
    test: test
    environment: prod
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app: equus-schedule-prod
  template:
    metadata:      
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "false"
        sidecar.istio.io/proxyCPU: "5m"
        sidecar.istio.io/proxyMemory: "128Mi"
        instrumentation.opentelemetry.io/inject-java: "true"
      labels:
        app: equus-schedule-prod
        project: equus-schedule
    spec:
      serviceAccountName: equus-schedule-prod-account
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - equus-schedule-prod
              topologyKey: "kubernetes.io/hostname"
      nodeSelector:
        Karpenter: enabled
      tolerations:
        - effect: "NoSchedule"
          key: xquare/critical_service
          operator: "Equal"
          value: "true"
      terminationGracePeriodSeconds: 120
      containers:
        - name: equus-schedule-prod
          image: 786584124104.dkr.ecr.ap-northeast-2.amazonaws.com/equus-schedule-prod:prod-oixwqav7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
          - secretRef:
              name: equus-schedule-prod
          resources:
            requests:
              memory: "2000Mi"
              cpu: "20m"
              ephemeral-storage: "20Mi"
            limits:
              memory: "2000Mi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            successThreshold: 3
---
# Source: applications/templates/vaultsecret.yaml
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: equus-schedule-prod-auth
  namespace: entry-prod
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: xquare
    serviceAccount: equus-schedule-prod-account
    audiences:
      - vault
---
# Source: applications/templates/vaultsecret.yaml
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: equus-schedule-prod-secret
  namespace: entry-prod
spec:
  mount: xquare-kv
  path: equus-schedule-prod
  destination:
    name: equus-schedule-prod
    create: true
  vaultAuthRef: entry-prod/equus-schedule-prod-auth
  rolloutRestartTargets:
    - kind: Deployment
      name: equus-schedule-prod
---
# Source: applications/templates/virtual-service.yaml
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: equus-schedule-prod-domain-ingress
  labels:
    app.kubernetes.io/instance: xquare-ingress
  namespace: entry-prod
spec:
  gateways:
    - istio-system/xquare-ingressgateway
  hosts:
    - equus-schedule.xquare.app
  http:
    - name: equus-schedule
      route:
        - destination:
            host: 'equus-schedule-prod.entry-prod.svc.cluster.local'
            port:
              number: 8080
      corsPolicy:
        allowOrigins:
          - regex: ".*"
        allowMethods:
          - POST
          - GET
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        allowCredentials: true
        allowHeaders:
          - content-type
          - authorization
          - accept
          - accept-encoding
          - Refresh-Token
          - X-Not-Using-Xquare-Auth
          - Oauth-Token
          - oa-token
          - Request-User-Id
          - Request-User-Role
          - X-Refresh-Token
          - x-identifier
        maxAge: "24h"
