---
# Source: applications/templates/poddistruptionbudget.yaml
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  namespace: xquare-stag
  name: gocdtest-stag
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gocdtest-stag
---
# Source: applications/templates/vaultsecret.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gocdtest-stag-account
  namespace: xquare-stag
---
# Source: applications/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  namespace: xquare-stag
  name: gocdtest-stag
  labels:
    app: gocdtest-stag
    project: gocdtest
    environment: stag
spec:
  type: ClusterIP
  selector:
    app: gocdtest-stag
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: port
      port: 8080
      targetPort: 8080
      protocol: TCP
---
# Source: applications/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: xquare-stag
  name: gocdtest-stag
  labels:
    app: gocdtest-stag
    project: gocdtest
    test: test
    environment: stag
spec:
  replicas: 1
  revisionHistoryLimit: 0
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  selector:
    matchLabels:
      app: gocdtest-stag
  template:
    metadata:      
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "false"
        sidecar.istio.io/proxyCPU: "5m"
        sidecar.istio.io/proxyMemory: "128Mi"
      labels:
        tags.datadoghq.com/env: stag
        tags.datadoghq.com/service: gocdtest-stag
        app: gocdtest-stag
        project: gocdtest
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - gocdtest-stag
              topologyKey: "kubernetes.io/hostname"
      nodeSelector:
        Karpenter: enabled
      tolerations:
      - effect: "NoSchedule"
        key: xquare/server
        operator: "Equal"
        value: "true"
      terminationGracePeriodSeconds: 120
      containers:
        - name: gocdtest-stag
          image: 786584124104.dkr.ecr.ap-northeast-2.amazonaws.com/
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
          - secretRef:
              name: gocdtest-stag
          resources:
            requests:
              memory: "2000Mi"
              cpu: "20m"
              ephemeral-storage: "20Mi"
            limits:
              memory: "2000Mi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            successThreshold: 3
---
# Source: applications/templates/vaultsecret.yaml
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: gocdtest-stag-auth
  namespace: xquare-stag
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: xquare
    serviceAccount: gocdtest-stag-account
    audiences:
      - vault
---
# Source: applications/templates/vaultsecret.yaml
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: gocdtest-stag-secret
  namespace: xquare-stag
spec:
  mount: xquare-kv
  path: gocdtest-stag
  destination:
    name: gocdtest-stag
    create: true
  vaultAuthRef: xquare-stag/gocdtest-stag-auth
  rolloutRestartTargets:
    - kind: Deployment
      name: gocdtest-stag
